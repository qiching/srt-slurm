name: "kimi-vllm-disagg-gb200-6p4d-dep16"

model:
  path: "kimi-k2.5-nvfp4"
  # vllm nightly should also work
  container: "vllm-v0.17.1"
  precision: "fp4"

dynamo:
  version: 1.0.0
  install: true

setup_script: install-deps.sh

resources:
  gpu_type: "gb200"
  gpus_per_node: 4
  prefill_nodes: 6
  decode_nodes: 4
  prefill_workers: 3
  decode_workers: 1
  gpus_per_prefill: 8
  gpus_per_decode: 16

frontend:
  type: dynamo
  enable_multiple_frontends: false

backend:
  type: vllm
  connector: null

  prefill_environment:
    VLLM_USE_FLASHINFER_MOE_FP4: "1"
    VLLM_USE_NCCL_SYMM_MEM: "1"

  decode_environment:
    VLLM_USE_FLASHINFER_MOE_FP4: "1"
    VLLM_USE_NCCL_SYMM_MEM: "1"

  vllm_config:
    prefill:
      kv-transfer-config: '{"kv_connector": "NixlConnector", "kv_role": "kv_both"}'
      served-model-name: "nvidia/Kimi-K2.5-NVFP4"
      kv-cache-dtype: "fp8"
      block-size: 64
      attention-config: '{"use_trtllm_ragged_deepseek_prefill": true}'
      tensor-parallel-size: 1
      pipeline-parallel-size: 1
      data-parallel-size: 8
      data-parallel-rpc-port: 13345
      enable-expert-parallel: true
      max-model-len: 10240
      max-num-seqs: 512
      enforce-eager: true
      max-num-batched-tokens: 16384
      safetensors-load-strategy: "prefetch"
      trust-remote-code: true
      no-enable-prefix-caching: true
      no-enable-chunked-prefill: true
      all2all-backend: "allgather_reducescatter"
      gpu-memory-utilization: 0.9

    decode:
      kv-transfer-config: '{"kv_connector": "NixlConnector", "kv_role": "kv_both"}'
      served-model-name: "nvidia/Kimi-K2.5-NVFP4"
      kv-cache-dtype: "fp8"
      block-size: 64
      attention-config: '{"use_trtllm_ragged_deepseek_prefill": true}'
      tensor-parallel-size: 1
      pipeline-parallel-size: 1
      data-parallel-size: 16
      data-parallel-rpc-port: 13345
      enable-expert-parallel: true
      max-model-len: 10240
      max-num-seqs: 1024
      max-num-batched-tokens: 10240
      safetensors-load-strategy: "prefetch"
      trust-remote-code: true
      no-enable-prefix-caching: true
      no-enable-chunked-prefill: true
      async-scheduling: true
      all2all-backend: "allgather_reducescatter"
      compilation-config: '{"cudagraph_mode":"FULL_DECODE_ONLY","custom_ops":["+quant_fp8","+rms_norm","+rotary_embedding"],"pass_config":{"fuse_attn_quant":true,"fuse_allreduce_rms":true}}'
      gpu-memory-utilization: 0.9
      stream-interval: 50
      max-cudagraph-capture-size: 1024

benchmark:
  type: "sa-bench"
  isl: 8192
  osl: 1024
  concurrencies: "512x1024x2048x4096"
  req_rate: "inf"
  random_range_ratio: 1.0
  use_chat_template: false
  num_prompts: 4096
  warmup_prompts: 1
