name: "kimi-vllm-disagg-gb200-2nodes"

model:
  path: "kmfp4"
  container: "/lustre/fsw/coreai_dlfw_dev/lijas/images/vllm+vllm-openai+cu130-nightly.sqsh"
  precision: "fp4"

dynamo:
  version: 1.0.0
  install: true

setup_script: install-deps.sh


resources:
  gpu_type: "gb200"
  gpus_per_node: 4
  prefill_nodes: 2
  decode_nodes: 2
  prefill_workers: 1
  decode_workers: 1
  gpus_per_prefill: 8
  gpus_per_decode: 8

frontend:
  type: dynamo
  enable_multiple_frontends: false

backend:
  type: vllm
  connector: null

  prefill_environment:
    VLLM_ATTENTION_BACKEND: "FLASHINFER_MLA"
    VLLM_USE_FLASHINFER_MOE_FP4: "1"
    VLLM_USE_TRTLLM_RAGGED_DEEPSEEK_PREFILL: "1"
    VLLM_FLASHINFER_MOE_BACKEND: "latency"

  decode_environment:
    VLLM_ATTENTION_BACKEND: "FLASHINFER_MLA"
    VLLM_USE_FLASHINFER_MOE_FP4: "1"
    VLLM_USE_TRTLLM_RAGGED_DEEPSEEK_PREFILL: "1"
    VLLM_FLASHINFER_MOE_BACKEND: "latency"
    VLLM_MOE_DP_CHUNK_SIZE: "1024"

  vllm_config:
    prefill:
      kv-transfer-config: '{"kv_connector": "NixlConnector", "kv_role": "kv_both"}'
      served-model-name: "deepseek-ai/DeepSeek-R1"
      tensor-parallel-size: 1
      data-parallel-size: 8
      data-parallel-rpc-port: 13345
      enable-expert-parallel: true
      max-model-len: 16384
      max-num-seqs: 256
      safetensors-load-strategy: "prefetch"
      trust-remote-code: true

    decode:
      kv-transfer-config: '{"kv_connector": "NixlConnector", "kv_role": "kv_both"}'
      served-model-name: "deepseek-ai/DeepSeek-R1"
      tensor-parallel-size: 1
      data-parallel-size: 8
      data-parallel-rpc-port: 13345
      enable-expert-parallel: true
      max-model-len: 16384
      max-num-seqs: 512
      async-scheduling: true
      safetensors-load-strategy: "prefetch"
      trust-remote-code: true
      max-cudagraph-capture-size: 512

benchmark:
  type: "sa-bench"
  isl: 8192
  osl: 1024
  concurrencies: "512x1024x2048x8192"
  req_rate: "inf"
